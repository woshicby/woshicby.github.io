    <div class="mainbox clearfix wrapper">
        <div class="back-to-tools">
            <a href="tools.html" class="back-button">← 返回小工具&小游戏</a>
        </div>

        <div class="tool-container">
            <h2 class="tool-page-title">生命灵数计算器</h2>
            <p class="tool-description">
                输入您的生日，计算生命灵数（Life Path Number），展示完整的逐位相加计算过程。
            </p>

            <div class="tabs">
            </div>

            <div class="calculator-section">
                <div class="input-group">
                    <h3>输入生日</h3>
                    <div class="birthday-inputs">
                        <div class="input-field">
                            <label for="birthdayInput">生日（YYYYMMDD）</label>
                            <input type="text" id="birthdayInput" placeholder="如：20000101" maxlength="8" inputmode="numeric" autocomplete="off">
                        </div>
                        <div class="input-hint">请输入8位数字，格式为年月日，如 20000101</div>
                    </div>
                </div>

                <div class="button-group">
                    <button id="calculate" class="calculate-button">计算生命灵数</button>
                    <button id="clearAll" class="secondary-button">清空</button>
                </div>
            </div>

            <div class="error-message" id="errorMessage" style="display: none;"></div>

            <div class="result-section" id="resultSection" style="display: none;">
                <h3>计算结果</h3>

                <div class="result-card result-final">
                    <div class="final-label">您的生命灵数</div>
                    <div id="finalResult" class="final-number"></div>
                    <div id="resultType" class="result-type"></div>
                </div>

                <div class="result-card">
                    <h4>计算过程</h4>
                    <div id="calculationSteps" class="calculation-steps"></div>
                </div>

                <div class="result-card">
                    <h4>灵数含义</h4>
                    <div id="numberMeaning" class="number-meaning"></div>
                </div>
            </div>
