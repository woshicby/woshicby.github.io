                        <label class="theme-toggle">
                            <input type="checkbox" id="themeToggle">
                            <span class="theme-toggle-slider"></span>
                        </label>
                    </li>
                </ul>
            </div>
            <!-- 导航栏结束 -->
        </div>
        <!-- 头部外套结束 -->
     
        <!-- 移动导航菜单切换按钮 -->
        <button class="nav-toggle" aria-label="切换导航菜单" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <!-- 主体外套开始 -->
        <!-- ========================================== 
             主体内容区域
             ==========================================
             包含本地大模型API对话工具的主要功能
             ========================================== -->
        <div class="mainbox clearfix wrapper">
            <!-- 小工具返回链接 -->
            <div class="back-to-tools">
                <a href="tools.html" class="back-button">← 返回小工具&小游戏</a>
            </div>
            
            <div class="tool-container">
                <h2 class="tool-page-title">本地大模型API对话工具</h2>
                <p class="tool-description">
                    与本地局域网下的LM Studio服务器进行对话的工具，支持实时交互和思考过程显示。
                </p>

                <div class="tabs">
                    <!-- 标签按钮由JS动态生成 -->
                </div>

                <!-- 服务器配置区域 -->
                <div class="server-config-section">
                    <h3>服务器配置</h3>
                    <div class="form-group">
                        <label for="serverUrl">服务器地址:</label>
                        <input type="text" id="serverUrl" value="http://10.244.166.147:1234/v1">
                        <button id="testConnection" class="test-button">测试连接</button>
                    </div>
                    <div class="form-group">
                        <label for="modelSelect">选择模型:</label>
                        <select id="modelSelect" disabled>
                            <option value="">请先测试连接</option>
                        </select>
                    </div>
                    <div id="connectionStatus" class="status-message"></div>
                </div>

                <!-- 对话管理区域 -->
                <div class="chat-management-section">
                    <h3>对话管理</h3>
                    <div class="chat-tabs">
                        <div id="chatTabs" class="chat-tabs-container">
                        </div>
                    </div>
                    <div class="data-management">
                        <button id="newChat" class="action-btn secondary">新对话</button>
                        <button id="exportChat" class="action-btn secondary">📤 导出对话</button>
                        <button id="importChat" class="action-btn secondary">📥 导入对话</button>
                        <input type="file" id="importFile" style="display: none;" accept=".json">
                    </div>
                </div>

                <!-- 对话区域 -->
                <div class="chat-container">
                    <h3>对话内容</h3>
                    <div id="chatMessages" class="chat-messages"></div>
                    <div class="chat-input">
                        <input type="text" id="userInput" placeholder="输入消息...">
                        <button id="sendMessage" class="send-button">发送</button>
                    </div>
                </div>
            </div>
        </div>
        <!-- 主体外套结束 -->
        <!-- 脚注外套开始 -->
