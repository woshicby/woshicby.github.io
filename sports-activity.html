<!DOCTYPE html>
<html lang="zh-CN">
<head>
   <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>运动详情 - 体育运动</title>

   <meta name="description" content="BY的运动详情记录，展示单个运动活动的详细信息。">
   <meta name="keywords" content="运动记录,跑步,骑行,活动详情">
   <meta name="author" content="woshicby">
   <meta name="robots" content="index, follow">

   <link rel="stylesheet" href="./CSS/common.css">
   <link rel="stylesheet" href="./CSS/tools-common.css">
   <link rel="stylesheet" href="./CSS/sports-common.css">
   <link rel="stylesheet" href="./CSS/sports.css">
   <link rel="stylesheet" href="./CSS/sports-home.css">
   <link rel="stylesheet" href="./CSS/sports-activity.css">
   <link rel="icon" href="./images/favicon.ico" type="image/x-icon">

   <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.js" defer onerror="window.mapboxglLoadFailed=true"></script>
   <script src="./JS/navigation.js"></script><!-- 引入导航功能脚本 -->
   <script src="./JS/theme-toggle.js"></script><!-- 引入主题切换脚本 -->
   <script src="./JS/background-lazy-load.js"></script><!-- 引入背景懒加载脚本 -->
   <script src="./JS/sports-config.js" defer></script>
   <script src="./JS/common.js" defer></script>
   <script src="./JS/sports-common.js" defer></script>
   <script src="./JS/sports-activity.js" defer></script>
</head>
<!-- ==========================================
        页面头部 - 网站标题和导航
        ==========================================
        包含网站标志和主导航菜单，当前高亮"体育运动"选项
        ========================================== -->

<body>
   <!-- 头部外套开始 -->
   <div class="header clearfix wrapper">
       <!-- logo/大标题区域开始 -->
       <h1>体育运动</h1>
       <!-- logo/大标题区域结束 -->
       <!-- 导航栏开始 -->
       <div class="nav">
           <ul class="clearfix">
                <li>
                   <label class="theme-toggle">
                       <input type="checkbox" id="themeToggle">
                       <span class="theme-toggle-slider"></span>
                   </label>
               </li>
            </ul>
       </div>
       <!-- 导航栏结束 -->
   </div>
   <!-- 头部外套结束 -->

   <!-- 移动导航菜单切换按钮 -->
   <button class="nav-toggle" aria-label="切换导航菜单" aria-expanded="false">
       <span></span>
       <span></span>
       <span></span>
   </button>
   <!-- 主体外套开始 -->
   <!-- ==========================================
            主体内容区域
            ==========================================
            展示单个运动活动的详细信息
            ========================================== -->
   <div class="mainbox clearfix wrapper">
       <div class="back-to-tools">
           <a href="sports.html" class="back-button" id="backButton">&larr; 返回活动列表</a>
       </div>
       <!-- 活动详情内容 -->
       <div class="sports-activity-container">
           <section class="activity-sidebar" id="activitySidebar">
               <div id="activityInfo">
                   <div class="summary-loading">加载中...</div>
               </div>
           </section>
           <section class="activity-content" id="activityContent">
               <div id="activityMap" class="map" style="display:none;"></div>
               <div id="activityCharts" class="activity-charts">
                   <div class="summary-loading">加载图表中...</div>
               </div>
           </section>
       </div>
   </div>
   <!-- 主体外套结束 -->
   <!-- 脚注外套开始 -->
   <div class="foot wrapper">
       <span>Github用户：woshicby&nbsp&nbsp版权所有&copy</span>
   </div>
   <!-- 脚注外套结束 -->
</body>

</html>
