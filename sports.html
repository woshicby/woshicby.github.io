<!DOCTYPE html>
<html lang="zh-CN">
<head>
   <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>体育运动 - BY的个人网站</title>

   <meta name="description" content="BY的体育运动记录，包含跑步、骑行等运动的活动记录、活跃统计图和运动量统计。">
   <meta name="keywords" content="运动记录,跑步,骑行,活动记录,活跃统计图,运动量统计">
   <meta name="author" content="woshicby">
   <meta name="robots" content="index, follow">

   <link rel="stylesheet" href="./CSS/common.css">
   <link rel="stylesheet" href="./CSS/sports-common.css">
   <link rel="stylesheet" href="./CSS/sports.css">
   <link rel="stylesheet" href="./CSS/sports-home.css">
   <link rel="icon" href="./images/favicon.ico" type="image/x-icon">

   <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.js" defer onerror="window.mapboxglLoadFailed=true"></script>
   <script src="./JS/navigation.js"></script><!-- 引入导航功能脚本 -->
   <script src="./JS/theme-toggle.js"></script><!-- 引入主题切换脚本 -->
   <script src="./JS/background-lazy-load.js"></script><!-- 引入背景懒加载脚本 -->
   <script src="./JS/sports-config.js" defer></script>
   <script src="./JS/sports-common.js" defer></script>
   <script src="./JS/sports-home.js" defer></script>
</head>
<!-- ==========================================
        页面头部 - 网站标题和导航
        ==========================================
        包含网站标志和主导航菜单，当前高亮"体育运动"选项
        ========================================== -->

<body>
   <!-- 头部外套开始 -->
   <div class="header clearfix wrapper">
       <!-- logo/大标题区域开始 -->
       <h1>体育运动</h1>
       <!-- logo/大标题区域结束 -->
       <!-- 导航栏开始 -->
       <div class="nav">
           <ul class="clearfix">
                <li>
                   <label class="theme-toggle">
                       <input type="checkbox" id="themeToggle">
                       <span class="theme-toggle-slider"></span>
                   </label>
               </li>
            </ul>
       </div>
       <!-- 导航栏结束 -->
   </div>
   <!-- 头部外套结束 -->

   <!-- 移动导航菜单切换按钮 -->
   <button class="nav-toggle" aria-label="切换导航菜单" aria-expanded="false">
       <span></span>
       <span></span>
       <span></span>
   </button>
   <!-- 主体外套开始 -->
   <!-- ==========================================
            主体内容区域
            ==========================================
            展示个人运动记录和活跃统计数据
            ========================================== -->
   <div class="mainbox clearfix wrapper">
       <!-- 体育运动子页面导航 -->
       <a href="sports.html" class="sports-tab-btn active">活动列表</a>
       <a href="sports-active.html" class="sports-tab-btn">活跃统计</a>
       <a href="sports-volume.html" class="sports-tab-btn">运动量统计</a>

       <!-- 内容区域：左右布局 -->
       <div class="sports-container">
           <!-- 左侧：侧边栏 -->
           <aside class="sports-sidebar" id="homeSidebar">
               <p class="location-info">跑过了一些地方，不要停下来...</p>
               <div class="filters" id="yearFilters">
               </div>
               <div class="sidebar-content" id="sidebarContent">
               </div>
           </aside>

           <!-- 右侧：主内容 -->
           <section class="sports-content" id="mapContainer">
               <div id="map" class="map">
                   <div class="map-placeholder">地图加载中...</div>
               </div>
               <div id="activitiesTable" class="activities-table">
               </div>
           </section>
       </div>
   </div>
   <!-- 主体外套结束 -->
   <!-- 脚注外套开始 -->
   <div class="foot wrapper">
       <span>Github用户：woshicby&nbsp&nbsp版权所有&copy</span>
   </div>
   <!-- 脚注外套结束 -->
</body>

</html>
