<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');</script>
    <title>运动详情 - 运动主页</title>
    <link rel="stylesheet" href="CSS/common.css">
    <link rel="stylesheet" href="CSS/home.css">
    <link rel="stylesheet" href="CSS/activity.css">
</head>
<body>
    <header class="header">
        <nav class="nav">
            <a href="index.html" class="nav-link" id="homeLink">首页</a>
            <a href="summary-active.html" class="nav-link" id="activeLink">活跃统计</a>
            <a href="summary-volume.html" class="nav-link" id="volumeLink">运动量统计</a>
        </nav>
        <button id="themeToggle" class="theme-toggle">切换主题</button>
    </header>

    <main class="container activity-container">
        <div class="sidebar activity-sidebar" id="activitySidebar">
            <a href="index.html" class="back-link">&larr; 返回首页</a>
            <div id="activityInfo">
                <div class="summary-loading">加载中...</div>
            </div>
        </div>
        <div class="content activity-content" id="activityContent">
            <div id="activityMap" class="map" style="display:none;"></div>
            <div id="activityCharts" class="activity-charts">
                <div class="summary-loading">加载图表中...</div>
            </div>
        </div>
    </main>

    <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.js" defer onerror="window.mapboxglLoadFailed=true"></script>
    <script src="JS/config.js" defer></script>
    <script src="JS/common.js" defer></script>
    <script src="JS/activity.js" defer></script>
</body>
</html>
