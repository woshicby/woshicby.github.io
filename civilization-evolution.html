        <!-- 头部外套开始 -->
        <div class="header clearfix wrapper">
            <!-- logo/大标题区域开始 -->

                        <label class="theme-toggle">
                            <input type="checkbox" id="themeToggle">
                            <span class="theme-toggle-slider"></span>
                        </label>
                    </li>
                </ul>
            </div>
            <!-- 导航栏结束 -->
        </div>
        <!-- 头部外套结束 -->
      
        <!-- 移动导航菜单切换按钮 -->
        <button class="nav-toggle" aria-label="切换导航菜单" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <!-- 主体外套开始 -->
        <div class="mainbox clearfix wrapper">
            <!-- 返回小工具页面的链接 -->
            <div class="back-to-tools">
                <a href="tools.html" class="back-button">← 返回小工具&小游戏</a>
            </div>
            
            <!-- 文明演化模拟器 -->
            <div class="tool-container">
                <h2 class="tool-page-title">多文明演化模拟器</h2>
                <p class="tool-description">
                    自动模拟多个文明的发展历程，展示文明间的交流、冲突与兴衰。
                    不需要任何操作，坐下来欣赏文明的演化故事吧！
                </p>

                <div class="tabs">
                    <!-- 标签按钮由JS动态生成 -->
                </div>
                
                <!-- 控制面板 -->
                <div class="control-section">
                    <div class="control-buttons">
                        <button id="startBtn" class="control-btn" onclick="startSimulation()" style="display: none;">▶ 开始</button>
                        <button id="pauseBtn" class="control-btn" onclick="pauseSimulation()">⏸ 暂停</button>
                        <button id="resumeBtn" class="control-btn" onclick="resumeSimulation()" style="display: none;">▶ 继续</button>
                        <button id="resetBtn" class="control-btn secondary" onclick="resetSimulation()">🔄 重置</button>
                        <button id="exportLogBtn" class="control-btn secondary" onclick="exportSimulationLog()">📋 导出日志</button>
                    </div>
                    <div class="speed-control">
                        <label for="speedSelect">演化速度：</label>
                        <select id="speedSelect">
                            <option value="slow">慢速</option>
                            <option value="medium" selected>中速</option>
                            <option value="fast">快速</option>
                        </select>
                    </div>
                    <div class="simulation-info">
                        <span>当前时间：<span id="currentTime">公元前3000年</span></span>
                        <span>已运行：<span id="runningTime">0分钟</span></span>
                    </div>
                </div>
                
                <!-- 事件时间线 -->
                <div class="timeline-section">
                    <h3>文明演化时间线</h3>
                    <div class="timeline" id="timeline">
                        <!-- 事件将通过JS动态生成 -->
                    </div>
                </div>
                
                <!-- 文明统计卡片容器 -->
                <div class="civilizations-section" id="civilizationsContainer">
                    <!-- 文明卡片将通过JS动态生成 -->
                </div>
                
                <!-- 地图和关系图区域 -->
                <div class="main-content-grid">
                    <!-- 地图显示 -->
                    <div class="map-section">
                        <h3>文明地图</h3>
                        <canvas id="civilizationMap" width="800" height="800"></canvas>
                    </div>
                    
                    <!-- 文明关系图 -->
                    <div class="relations-section">
                        <h3>文明关系</h3>
                        <div class="relations-graph" id="relationsGraph">
                            <!-- 文明关系将通过JS动态生成 -->
                        </div>
                    </div>
                </div>
                
                <!-- 文明详细信息面板 -->
                <div class="details-section">
                    <h3>文明详细信息</h3>
                    <div class="civilization-details" id="civilizationDetails">
                        <!-- 文明详细信息将通过JS动态生成 -->
                    </div>
                </div>
            </div>
        </div>
        <!-- 主体外套结束 -->
        <!-- 页脚区域 -->
        <div class="foot wrapper">
            <span>Github用户：woshicby&nbsp&nbsp版权所有&copy</span>
