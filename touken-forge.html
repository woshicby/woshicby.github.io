<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>锻刀模拟器 - BY的个人网站</title>

    <meta name="keywords" content="刀剑乱舞,锻刀模拟器,锻刀配方,刀剑乱舞攻略,锻刀概率">
    <meta name="author" content="woshicby">
    <meta name="robots" content="index, follow">

    <meta property="og:title" content="锻刀模拟器 - BY的个人网站">
    <meta property="og:description" content="刀剑乱舞锻刀模拟器，模拟游戏中的锻刀系统，支持所有刀剑类型的锻造配方模拟。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://woshicby.github.io/touken-forge.html">
    <meta property="og:image" content="https://woshicby.github.io/images/test_image.jpg">
    <meta property="og:site_name" content="BY的个人网站">
    <meta property="og:locale" content="zh_CN">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="锻刀模拟器 - BY的个人网站">
    <meta name="twitter:description" content="刀剑乱舞锻刀模拟器，模拟游戏中的锻刀系统，支持所有刀剑类型的锻造配方模拟。">
    <meta name="twitter:image" content="https://woshicby.github.io/images/test_image.jpg">

    <link rel="stylesheet" href="./CSS/common.css">
    <link rel="stylesheet" href="./CSS/tools-common.css">
    <link rel="stylesheet" href="./CSS/touken-forge.css">
    <link rel="icon" href="./images/favicon.ico" type="image/x-icon">
    <link rel="canonical" href="https://woshicby.github.io/touken-forge.html">

    <script src="./JS/navigation.js"></script><!-- 引入导航功能脚本 -->
    <script src="./JS/theme-toggle.js"></script><!-- 引入主题切换脚本 -->
    <script src="./JS/background-lazy-load.js"></script><!-- 引入背景懒加载脚本 -->
    <script src="./JS/tool-tabs.js"></script><!-- 引入工具标签动态加载脚本 -->
    <script src="./JS/touken-forge.js"></script><!-- 引入锻刀模拟器脚本 -->
</head>
<!-- 页面头部 - 网站标题和导航 -->

<body>
    <!-- 头部外套开始 -->
    <div class="header clearfix wrapper">
        <!-- logo/大标题区域开始 -->
        <h1>锻刀模拟器</h1>
        <!-- logo/大标题区域结束 -->
        <!-- 导航栏开始 -->
        <div class="nav">
            <ul class="clearfix">
                <li><a href="./index.html">首页</a></li>
                <li><a href="./video.html">视频展示</a></li>
                <li><a href="./posts.html">博客文章</a></li>
                <li><a href="./study.html">个人成果</a></li>
                <li><a href="./tools.html">小工具&小游戏</a></li>
                <li><a href="./sports.html">体育运动</a></li>
                <li>
                    <label class="theme-toggle">
                        <input type="checkbox" id="themeToggle">
                        <span class="theme-toggle-slider"></span>
                    </label>
                </li>
            </ul>
        </div>
        <!-- 导航栏结束 -->
    </div>
    <!-- 头部外套结束 -->

    <!-- 移动导航菜单切换按钮 -->
    <button class="nav-toggle" aria-label="切换导航菜单" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
    </button>
    <!-- 主体外套开始 -->
    <div class="mainbox clearfix wrapper">
        <!-- 返回小工具页面的链接 -->
        <div class="back-to-tools">
            <a href="tools.html" class="back-button">← 返回小工具&小游戏</a>
        </div>
        <!-- 刀剑乱舞锻刀模拟器 -->
        <div class="tool-container">
            <h2 class="tool-page-title">锻刀模拟器</h2>
            <p class="tool-description">
                模拟《刀剑乱舞online》中的锻刀功能，通过不同的资源配比来锻造各种稀有度的刀剑。
            </p>

            <div class="tabs">
                <!-- 标签按钮由JS动态生成 -->
            </div>

            <!-- 统计信息区域 -->
            <div class="stats-container">
                <span>锻刀次数: <span id="forgeCount">0</span></span>
                <span>刀解刀剑: <span id="deleteCount">0</span></span>
            </div>

            <!-- 资源区域 -->
            <div class="resources-section">
                <div class="resource-item">
                    <div class="resource-name">木炭</div>
                    <div class="resource-value" id="charcoalValue">500000</div>
                    <input type="number" id="charcoalInput" class="resource-input" placeholder="0" min="0">
                </div>
                <div class="resource-item">
                    <div class="resource-name">玉刚</div>
                    <div class="resource-value" id="steelValue">500000</div>
                    <input type="number" id="steelInput" class="resource-input" placeholder="0" min="0">
                </div>
                <div class="resource-item">
                    <div class="resource-name">冷却材</div>
                    <div class="resource-value" id="coolantValue">500000</div>
                    <input type="number" id="coolantInput" class="resource-input" placeholder="0" min="0">
                </div>
                <div class="resource-item">
                    <div class="resource-name">砥石</div>
                    <div class="resource-value" id="whetstoneValue">500000</div>
                    <input type="number" id="whetstoneInput" class="resource-input" placeholder="0" min="0">
                </div>
            </div>


            <!-- 锻造区域 -->
            <div class="forge-section">
                <button id="forgeButton" class="forge-button">开始锻造</button>
                <button id="speedUpButton" class="forge-button" style="display:none;">使用加速符</button>
                <div id="forgeStatus" class="forge-status">准备就绪</div>
                <div id="forgeTimer" class="forge-timer" style="display: none;">00:00</div>
            </div>

            <!-- 结果区域 -->
            <div id="resultContainer" class="result-section">
                <img id="resultImage" class="result-image" src="./images/touken/刀账图标/default_sword.jpg" alt="锻造结果">
                <div id="resultName" class="result-name">未知刀剑</div>
                <div id="resultRarity" class="rarity common">普通</div>
            </div>

            <!-- 已有刀剑区域 -->
            <div class="collection-section">
                <div class="collection-header">
                    <div class="collection-title">我的刀剑</div>
                    <div class="collection-count" id="collectionCount">0</div>
                </div>
                <div id="collectionList" class="collection-list">
                    <!-- 已有的刀剑会动态添加到这里 -->
                </div>
                <div class="data-management">
                    <button id="clearSwordsBtn" class="action-btn secondary">🗑️ 清空刀剑</button>
                    <button id="exportSwordsBtn" class="action-btn secondary">📤 导出刀剑</button>
                    <button id="importSwordsBtn" class="action-btn secondary">📥 导入刀剑</button>
                    <input type="file" id="importSwordsFile" accept=".json" style="display:none">
                </div>
            </div>

            <!-- 日志区域 -->
            <div class="log-section">
                <div class="log-header">
                    <div class="log-title">锻刀日志</div>
                </div>
                <div id="logArea" class="log-area"></div>
                <div class="data-management">
                    <button id="clearLogBtn" class="action-btn secondary">🗑️ 清空日志</button>
                    <button id="exportLogBtn" class="action-btn secondary">📤 导出日志</button>
                    <button id="importLogBtn" class="action-btn secondary">📥 导入日志</button>
                    <input type="file" id="importLogFile" accept=".json" style="display:none">
                </div>
            </div>

            <!-- 数据管理按钮 -->
            <div class="data-controls">
                <button id="resetBtn" class="action-btn secondary">🔄 重置所有数据</button>
                <button id="exportBtn" class="action-btn secondary">📤 导出所有数据</button>
                <button id="importBtn" class="action-btn secondary">📥 导入所有数据</button>
                <input type="file" id="importFile" accept=".json" style="display:none">
            </div>
        </div>
    </div>
    <!-- 主体外套结束 -->
    <!-- 页脚区域 -->
    <div class="foot wrapper">
        <span>Github用户：woshicby&nbsp&nbsp版权所有&copy</span>
    </div>
    <!-- 脚注外套结束 -->

</body>

</html>
